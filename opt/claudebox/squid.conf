# Minimal whitelist-only forward proxy for claudebox restricted mode.
# The whitelist is assembled by the entrypoint at container start.
http_port 127.0.0.1:3128
visible_hostname claudebox
pid_filename /run/squid.pid
cache_effective_user proxy

# Pure egress filter: no caching.
cache deny all
access_log stdio:/var/log/squid/access.log
cache_log /var/log/squid/cache.log

acl whitelisted dstdomain "/run/claudebox/whitelist.txt"
acl SSL_ports port 443
acl CONNECT method CONNECT

http_access deny CONNECT !SSL_ports
http_access allow whitelisted
http_access deny all
