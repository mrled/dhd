# TMUX outer configuration — M-t prefix for nesting inside another tmux session

set-option -g prefix M-t
source-file ~/.dhd/hbase/.tmux.base.conf

# M-t M-t moves to previously-selected window
bind-key M-t last-window

# Easily reload config
bind-key r source-file ~/.dhd/hbase/.tmux.outer.conf \; display-message "Config reloaded..."

# Respawn every inner attach window (created by vt) in this outer session so
# the inner servers re-read SSH_CONNECTION/SSH_AUTH_SOCK etc from the current
# outer env. Windows running real shells are untouched.
bind-key E run-shell '~/.dhd/opt/bin/vt -R "#{socket_path}" "#{session_id}"' \; \
    display-message "Inner envs refreshed"

