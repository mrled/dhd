# Shared base — sourced by .tmux.conf and .tmux.outer.conf

unbind-key C-b

# prefix+t sends the prefix through to nested sessions
bind-key t send-prefix

# Start numbering at 1
set -g base-index 1

# Select window 10 with prefix+0
bind-key 0 select-window -t :10

# Read host-specific and local configs
run-shell 'h=$(hostname); f="$HOME/.dhd/hosts/$h/tmux.conf"; test -r "$f" && tmux source-file "$f" || true'
if-shell 'test -r ~/.tmux.local.conf' 'source-file ~/.tmux.local.conf'

# Force RGB support in certain terminals.
# For xterm-256color this is technically wrong,
# but lots of stuff (e.g. blink) claims to be xterm-256color
# so we just force it.
set -as terminal-features ',xterm-256color:RGB'
set -as terminal-features ',xterm-ghostty:RGB'
set -as terminal-features ',xterm-ghostty:hyperlinks'

# Allow passthrough of escape sequences (required for OSC 8 hyperlinks, etc.)
set -g allow-passthrough on

# Extended key reporting so terminals can distinguish e.g. C-S-[ from C-[
set -g extended-keys always

# Navigate panes without prefix
bind-key -n C-S-. select-pane -t :.+
bind-key -n C-S-, select-pane -t :.-

# Forward OSC 52 clipboard requests from panes to the outer terminal
set -g set-clipboard on

# Increase scrollback buffer size
set -g history-limit 1000000

set -g status-style 'bg=black fg=white'
set -g window-status-format '#I:#W#F '
set -g window-status-current-style 'bg=color55 fg=white bold'
set -g window-status-last-style 'bg=color17 fg=white bold'
set -g status-right ''

# Show hostname and session name
# Truncate them to reasonable limits and then limit the total length to the sum of those limits + spaces
set -g status-left '#[fg=magenta]#{=12:host} #[fg=green]#{=12:session_name} '
set -g status-left-length 26
